<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propiedades de texto</title>
    <meta name="author" content="Vicente Valdebenito">

    <link rel="stylesheet" href="static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;600&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <h1 class="tituloPrincipal textoCentro subtitulo1">Propiedades de texto - CSS </h1>
    </header>
    <main class="container">
        <p class="textoIzquierda">Esto es un texto alineado hacia la izquierda</p>
        <h2 class="textoCentro tachado">Texto alineado al centro</h2>
        <h3 class="textoDerecha">Texto alineado a la derecha</h3>
        <hr>
        <h2 class="textoIzquierda subtitulo1">Ejemplos decoración:</h2>
        <p>Ejemplo 1: <span class="tachado">Elemento tachado</span></p>
        <p>Ejemplo 2: Esto es un <a href="#" class="sinDecoracion">link</a></p>
        <p>Ejemplo 3: <span class="subtitulo1">Subrayado y cursiva</span></p>
        <p>Ejemplo 4: <span class="negrita">Negrita</span></p>
        <p>Ejemplo 5: <span class="semiNegrita">Fuente mas delgada</span></p>
    </main>
    <!-- Conexion con JS -->
    <script src="static/js/script.js"></script>
</body>

</html>
