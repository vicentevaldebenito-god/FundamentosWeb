
<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Crear una cuenta en discord</h1>
    <br>
    <div>
        <label for="name">Nombre:</label>
        <input type="text" id="name" name="name"><br><br>
    </div>
    <div>
        <label for="email">Correo electrónico:</label>
        <input type="email" id="email" name="email"><br><br>
    </div>
    <div>
        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password"><br><br>
    </div>
    <div>
        <label for="confirm_password">Confirmar contraseña:</label>
        <input type="password" id="confirm_password" name="confirm_password"><br><br>
    </div>
    <div>
        <label for="fecha_nacimiento">Fecha de nacimiento:</label>
        <input type="date" id="fecha_nacimiento" name="fecha_nacimiento"><br><br>
    </div>
    <div>
        <label for="genero">Género:</label>
        <select id="genero" name="genero">
            <option value="masculino">Masculino</option>
            <option value="femenino">Femenino</option>
            <option value="otro">Otro</option>
        </select><br><br>
    </div>
    <div>
        <label for="descripcion">Descripción Sobre ti:</label><br>
        <textarea id="descripcion" name="descripcion"></textarea><br><br>  
    </div>
    <div>
        <label for="intereses">Intereses:</label><br>
        <input type="checkbox" id="gaming" name="intereses" value="gaming">
        <label for="gaming">Gaming</label><br>
        <input type="checkbox" id="musica" name="intereses" value="musica">
        <label for="musica">Música</label><br>
        <input type="checkbox" id="deportes" name="intereses" value="deportes">
        <label for="deportes">Deportes</label><br>
        <input type="checkbox" id="arte" name="intereses" value="arte">
        <label for="arte">Arte</label><br><br>
    </div>
    <div>
        <label for="registrar">Al registrarme acepto los <a href="https://discord.com/terms">términos y condiciones</a> de Discord.</label>
        <input type="checkbox" id="registrar" name="registrar">
    </div>
    <br>
    <div>
        <input type="submit" value="Registrarte">
    </div>

</body>

</html>
